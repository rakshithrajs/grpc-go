syntax = "proto3";

package UMS.v1;

option go_package = "/UMS/gen/UMS/v1;UMS";

// UMS service provides authentication and user profile operations.
service UMS {

    // RegisterUser creates a new user UMS.
    rpc RegisterUser (RegisterUserRequest) returns (RegisterUserResponse);

    // LoginUser issues a JWT for an existing user.
    rpc LoginUser (LoginUserRequest) returns (LoginUserResponse);

    // GetUserProfile returns the authenticated user's profile.
    rpc GetUserProfile (GetUserProfileRequest) returns (GetUserProfileResponse);

    // UpdateUserProfile updates the authenticated user's profile.
    rpc UpdateUserProfile (UpdateUserProfileRequest) returns (UpdateUserProfileResponse);
}

// User represents a registered UMS.
message User {

    // user's id
    string id = 1;

    // user's name
    string name = 2;

    // user's email
    string email = 3;

    // user's phone
    string phone = 4;
}

// RegisterUserRequest contains registration information.
message RegisterUserRequest {

    // user's name
    string name = 1;

    // user's email
    string email = 2;

    // user's password
    string password = 3;

    // user's phone
    string phone = 4;

    // confirmation of the user's password
    string confirm_password = 5;
}

// RegisterUserResponse contains the created user.
message RegisterUserResponse {

    // newly created user
    User user = 1;
}

// LoginUserRequest contains the user's email and password.
message LoginUserRequest {

    // user's email
    string email = 1;

    // user's password
    string password = 2;
}

// LoginUserResponse contains the JWT token for the user.
message LoginUserResponse {

    // auth token
    string token = 1;
}

// GetUserProfileRequest is the input for fetching a profile.
message GetUserProfileRequest {}

// GetUserProfileResponse contains the user object.
message GetUserProfileResponse {

    // requested user object
    User user = 1;
}

// UpdateUserProfileRequest contains the user's new details.
message UpdateUserProfileRequest {

    // user's name
    string name = 1;

    // user's email
    string email = 2;

    // user's password
    string password = 3;

    // user's phone
    string phone = 4;

    // confirmation of the user's password
    string confirm_password = 5;
}

// UpdateUserProfileResponse is empty.
message UpdateUserProfileResponse {}
