syntax = "proto3";

package files;

option go_package = "gen/files/v1;files";

// files service provide file operations in the cloud
service files {

    // UploadFile uploads file to the cloud
    rpc UploadFile (UploadFileRequest) returns (UploadFileResponse);

    // DownloadFile downloads file from cloud
    rpc DownloadFile (DownloadFileRequest) returns (DownloadFileResponse);

    // ListFiles returns a list files from the cloud
    rpc ListFiles (ListFilesRequest) returns (ListFilesResponse);

    // DeleteFile deletes inteded file from cloud
    rpc DeleteFile (DeleteFileRequest) returns (DeleteFileResponse);

    // RenameFile renames inteded file from cloud
    rpc RenameFile (RenameFileRequest) returns (RenameFileResponse);
}

message File {
    string ID = 1;
    string fileName = 2;
    int64 fileSize = 3;
    string mimeType = 4; 
}

// UploadFileRequest contans file metadata
message UploadFileRequest {

    // file's name
    string fileName = 1;

    // file's content
    bytes content = 2;
}

// UploadFileResponse contains uploaded file metadata
message UploadFileResponse {
    File file = 1;
}

// DownloadFileRequest contains the file Id to download
message DownloadFileRequest {

    // file's ID to downlaod
    string fileID = 1;
}

// DownloadFileResponse contains the file's metadata and content
message DownloadFileResponse {

    // file's name
    string fileName = 1;

    // file's type
    string mimeType = 2;

    // file's content
    bytes content = 3;
}

// DeleteFileRequest contains the file Id to be deleted
message DeleteFileRequest {

    // file's ID
    string fileID = 1;
}

// DeleteFileResponse 
message DeleteFileResponse {}

// RenameFileRequest contains the file's new name
message RenameFileRequest {
    
    // file's ID
    string fileID = 1;

    // file's New Name
    string newName = 2;
}

// RenameFileResponse 
message RenameFileResponse {}

// ListFilesRequest
message ListFilesRequest {}

// ListFielsResponse contains the list of files
message ListFilesResponse {
    repeated File file = 1; 
}